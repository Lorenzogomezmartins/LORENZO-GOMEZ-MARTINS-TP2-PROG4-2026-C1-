<section class="page">
  <div class="card">
    
    <h1>Iniciar sesión</h1>
    <p class="subtitle">Entrá con tu correo o nombre de usuario.</p>

    <form [formGroup]="loginForm" (ngSubmit)="ingresar()">
      <label>
        Correo o nombre de usuario
        <input type="text" formControlName="identificador" />
        <span *ngIf="loginForm.get('identificador')?.touched && loginForm.get('identificador')?.invalid">
          Este campo es obligatorio.
        </span>
      </label>

      <label>
        Contraseña
        <input type="password" formControlName="password" />
        <span *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          Mínimo 8 caracteres, una mayúscula y un número.
        </span>
      </label>

      <p class="error" *ngIf="error">{{ error }}</p>

      <button type="submit">Ingresar</button>
    </form>

    <p class="link">
      ¿No tenés cuenta?
      <a routerLink="/registro">Registrate</a>
    </p>
  </div>
</section>
